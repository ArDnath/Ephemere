<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes inkDraw {
      from { stroke-dashoffset: 300; opacity: 0; }
      10%  { opacity: 1; }
      to   { stroke-dashoffset: 0; opacity: 1; }
    }

    @keyframes fade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes dropBloom {
      0%   { r: 0; opacity: 0.8; }
      40%  { r: 5; opacity: 0.5; }
      100% { r: 0; opacity: 0; }
    }

    .stroke {
      fill: none;
      stroke: #18150f;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
    }

    /* layered strokes for brush feel */
    .s1 { stroke-width: 10; opacity: 0.9; animation: inkDraw 1.2s ease-out 0s both infinite, fade 1.5s ease-in 3s both infinite; }
    .s2 { stroke-width: 6;  opacity: 0.6; animation: inkDraw 1.1s ease-out 0.1s both infinite, fade 1.5s ease-in 3s both infinite; }
    .s3 { stroke-width: 3;  opacity: 0.4; animation: inkDraw 1.0s ease-out 0.2s both infinite, fade 1.5s ease-in 3s both infinite; }

    .dot {
      fill: #18150f;
      animation: dropBloom 1s ease-out infinite;
    }

    .d1 { animation-delay: 0.3s; }
    .d2 { animation-delay: 0.8s; }

    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #ece8de; }
      .dot    { fill:   #ece8de; }
    }
  </style>

  <!-- Enso brushstroke (imperfect circle) -->
  <path class="stroke s1"
    d="M75,50
       C75,30 60,20 45,22
       C30,24 20,38 24,55
       C28,70 45,78 60,72
       C70,68 76,60 75,50" />

  <path class="stroke s2"
    d="M74,50
       C74,31 59,21 45,23
       C31,25 22,38 25,54
       C29,69 45,76 59,71
       C69,67 75,60 74,50" />

  <path class="stroke s3"
    d="M76,50
       C76,29 61,19 45,21
       C29,23 19,39 23,56
       C27,72 46,80 62,73
       C71,69 77,60 76,50" />

  <!-- ink droplets (ephemeral) -->
  <circle class="dot d1" cx="70" cy="30" />
  <circle class="dot d2" cx="35" cy="75" />

</svg>
