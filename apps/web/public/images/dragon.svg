<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <circle cx="200" cy="200" r="180" fill="#f5f5f5" stroke="#e5e5e5" stroke-width="2"/>
  <g transform="translate(60, 40) scale(0.7)">
    <!-- Dragon body -->
    <path d="M180 100c-20-10-40-5-55 15-10 15-10 35 0 50 10 15 30 20 45 15 15-5 25-20 25-35 0-20-10-40-15-45z" fill="#4a4a4a"/>
    <!-- Dragon neck and head -->
    <path d="M220 120c10-20 25-35 45-40 20-5 40 5 50 25 10 20 5 45-10 60-15 15-40 20-60 10-15-5-25-20-25-35 0-10 0-15 0-20z" fill="#4a4a4a"/>
    <!-- Eye -->
    <circle cx="260" cy="110" r="8" fill="#ffffff"/>
    <circle cx="262" cy="110" r="4" fill="#000000"/>
    <!-- Horn -->
    <path d="M250 80c5-15 15-25 20-35 5 10 5 25 0 35-5 5-15 5-20 0z" fill="#4a4a4a"/>
    <!-- Wing -->
    <path d="M160 130c-30-20-50-10-70 20-10 20-5 50 15 70 20 15 50 15 70 0 15-15 15-40 0-55-5-5-10-10-15-35z" fill="#6a6a6a" opacity="0.6"/>
    <!-- Tail -->
    <path d="M120 160c-20 10-40 30-45 55-5 25 5 50 25 65 15-15 20-40 10-60-5-15-10-30 10-60z" fill="#4a4a4a"/>
    <!-- Fire breath -->
    <path d="M290 130c15-5 30 5 40 20 10 15 10 35 0 50-5 10-15 15-25 10-10-10-15-30-15-45 0-15 0-25 0-35z" fill="#ff6b35" opacity="0.4"/>
    <path d="M295 140c10-3 20 5 25 15 5 10 5 25 0 35-3 7-10 10-15 7-7-7-10-20-10-30 0-10 0-20 0-27z" fill="#ff9f1c" opacity="0.5"/>
  </g>
  <!-- Question marks -->
  <text x="70" y="120" font-size="40" fill="#d4d4d4" font-family="sans-serif" font-weight="bold">?</text>
  <text x="310" y="100" font-size="30" fill="#d4d4d4" font-family="sans-serif" font-weight="bold">?</text>
  <text x="320" y="280" font-size="35" fill="#d4d4d4" font-family="sans-serif" font-weight="bold">?</text>
</svg>
